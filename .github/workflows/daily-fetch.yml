name: Daily Fetch & Deploy

on:
  schedule:
    # NYT updates at UTC 00:00, run at 00:10 to be safe
    - cron: '10 0 * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch today's answers
        run: python3 scripts/fetch_answers.py

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name=spelling-bee-answers --branch=main

      - name: Commit updated answers.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/answers.json
          git diff --staged --quiet || git commit -m "chore: auto-update answers $(date -u +%Y-%m-%d)"
          git push
